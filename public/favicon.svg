<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nestworth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1F5C39"/>
      <stop offset="100%" stop-color="#0B2D1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DC9A"/>
      <stop offset="50%" stop-color="#D4B26C"/>
      <stop offset="100%" stop-color="#9A7635"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9B3"/>
      <stop offset="100%" stop-color="#E8C480"/>
    </linearGradient>
  </defs>

  <!-- 深翠绿圆角矩形主体 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 金色盾牌 -->
  <path d="M 32 8 L 52 14 L 52 36 Q 52 48 32 56 Q 12 48 12 36 L 12 14 Z"
        fill="url(#gold)"/>
  <path d="M 32 12 L 48 17 L 48 35 Q 48 45 32 52 Q 16 45 16 35 L 16 17 Z"
        fill="url(#bg)"/>

  <!-- 衬线大写 N -->
  <text x="32" y="42"
        font-family="'Playfair Display','Times New Roman',serif"
        font-size="26" font-weight="700"
        fill="url(#gold)" text-anchor="middle">N</text>

  <!-- 顶部资产上扬折线 -->
  <polyline points="18,7 22,5 27,6 33,4 40,5 46,3"
            stroke="url(#goldLight)" stroke-width="1.7" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>
</svg>
